<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahaland Maintenance - Thingyan</title>
<style>
body, html {margin:0;padding:0;font-family:'Poppins', sans-serif;height:100%;background:url('mahaland-bg.png') no-repeat center center fixed;background-size:cover;}
.overlay {background:rgba(0,50,150,0.45);width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;color:#fff;text-align:center;padding:20px;}
.logo {width:160px;margin-bottom:30px;animation:float 2s infinite alternate;}
@keyframes float {0%{transform:translateY(0);}100%{transform:translateY(-10px);}}
h1 {font-size:3em;margin-bottom:15px;color:#ff6f61;text-shadow:2px2px8px rgba(0,0,0,0.7);animation:blink 1.5s infinite alternate;}
@keyframes blink {0%{text-shadow:2px2px8px rgba(0,0,0,0.7),0 0 5px #ff6f61;}100%{text-shadow:2px2px8px rgba(0,0,0,0.7),0 0 20px #ff6f61;}}
p.subtitle {font-size:1.2em;margin-bottom:40px;color:#ffffffcc;}
#countdown {display:flex;gap:20px;font-size:1.8em;font-weight:bold;}
.count-box {background: rgba(255,255,255,0.2);padding:15px 25px;border-radius:12px;min-width:70px;transition:0.3s all;}
.count-box:hover {background:#ff6f61;color:#fff;transform:scale(1.1);}
</style>
</head>
<body>
<div class="overlay">
  <img src="mahaland-logo.png" alt="Mahaland Logo" class="logo">
  <h1>Splashing into a Fresh Start!</h1>
  <p class="subtitle">Celebrate Thingyan with us while we prepare an even better marketplace!</p>
  <div id="countdown">
    <div class="count-box" id="days">0d</div>
    <div class="count-box" id="hours">0h</div>
    <div class="count-box" id="minutes">0m</div>
    <div class="count-box" id="seconds">0s</div>
  </div>
</div>
<script>
const countdownDuration = 72*60*60; let remaining = countdownDuration;
const d=document.getElementById("days"),h=document.getElementById("hours"),m=document.getElementById("minutes"),s=document.getElementById("seconds");
function updateCountdown(){const days=Math.floor(remaining/(60*60*24)),hours=Math.floor((remaining%(60*60*24))/(60*60)),minutes=Math.floor((remaining%(60*60))/60),seconds=remaining%60;d.innerHTML=days+"d";h.innerHTML=hours+"h";m.innerHTML=minutes+"m";s.innerHTML=seconds+"s";if(remaining>0)remaining--;}
updateCountdown(); setInterval(updateCountdown,1000);
</script>
</body>
</html>
