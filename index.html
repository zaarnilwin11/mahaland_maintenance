<!DOCTYPE html>
<html>
<head>
<title>Mahaland</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#134e5e,#71b280);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

.brand{
font-size:46px;
font-weight:bold;
margin-bottom:20px;
}

.message{
font-size:20px;
line-height:1.6;
margin-bottom:40px;
}

.countdown{
font-size:38px;
font-weight:bold;
}

</style>
</head>

<body>

<div>

<div class="brand">Mahaland</div>

<div class="message">
🏡 Even great lands need a splash of renewal.<br><br>
As Myanmar welcomes the New Year with Thingyan water,
our website is taking a refreshing pause.<br><br>
We'll be back soon with a smoother experience.
</div>

<div id="countdown" class="countdown"></div>

</div>

<script>

var countDownDate = new Date("Apr 26, 2026 18:00:00").getTime();

var x = setInterval(function(){

var now = new Date().getTime();
var distance = countDownDate - now;

var days = Math.floor(distance / (1000 * 60 * 60 * 24));
var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
var seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("countdown").innerHTML =
days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

if(distance < 0){
clearInterval(x);
document.getElementById("countdown").innerHTML = "We're Back!";
}

},1000);

</script>

</body>
</html>
